<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#131f38"/>
    </linearGradient>

    <linearGradient id="geminiGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <linearGradient id="stravaRingGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#FC4C02"/>
    </linearGradient>

    <linearGradient id="hevyRingGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <filter id="glowG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrR" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4285f4" opacity="0.7"/>
    </marker>
    <marker id="arrL" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto-start-reverse">
      <polygon points="0 0,8 3,0 6" fill="#4285f4" opacity="0.7"/>
    </marker>
    <marker id="arrR2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6" opacity="0.7"/>
    </marker>
    <marker id="arrL2" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto-start-reverse">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.045" stroke="#94a3b8" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
    <line x1="0"   y1="90"  x2="800" y2="90"/>
    <line x1="0"   y1="180" x2="800" y2="180"/>
    <line x1="0"   y1="270" x2="800" y2="270"/>
    <line x1="0"   y1="360" x2="800" y2="360"/>
  </g>

  <!-- Header text -->
  <text x="400" y="52" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700"
        fill="#f1f5f9" letter-spacing="-0.5">Fitness Agent</text>
  <text x="400" y="76" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"
        letter-spacing="0.8">MULTI-AGENT COACHING · GOOGLE ADK + VERTEX AI</text>

  <!-- ── Connection lines: Strava ↔ Gemini ── -->
  <!-- going right (Strava → Gemini) -->
  <line x1="258" y1="218" x2="326" y2="218"
        stroke="#FC4C02" stroke-width="1.4" stroke-opacity="0.55"
        stroke-dasharray="5,4" marker-end="url(#arrR)"/>
  <!-- going left (Gemini → Strava) -->
  <line x1="326" y1="233" x2="258" y2="233"
        stroke="#4285f4" stroke-width="1.4" stroke-opacity="0.55"
        stroke-dasharray="5,4" marker-end="url(#arrL)"/>

  <!-- ── Connection lines: Gemini ↔ Hevy ── -->
  <line x1="474" y1="218" x2="542" y2="218"
        stroke="#4285f4" stroke-width="1.4" stroke-opacity="0.55"
        stroke-dasharray="5,4" marker-end="url(#arrR2)"/>
  <line x1="542" y1="233" x2="474" y2="233"
        stroke="#3b82f6" stroke-width="1.4" stroke-opacity="0.55"
        stroke-dasharray="5,4" marker-end="url(#arrL2)"/>

  <!-- Connection labels -->
  <text x="292" y="211" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b">activities</text>
  <text x="508" y="211" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b">routines</text>

  <!-- ═══════════════════════════════════════
       STRAVA NODE  (center x=192, y=225)
  ═══════════════════════════════════════ -->
  <g transform="translate(192,225)">
    <!-- Outer ambient glow -->
    <circle r="72" fill="#FC4C02" opacity="0.07"/>
    <!-- Ring -->
    <circle r="64" fill="#0e1e35" stroke="url(#stravaRingGrad)" stroke-width="1.8"/>

    <!-- Strava chevron S (two stacked chevrons, pointing right) -->
    <g filter="url(#glowS)">
      <!-- Top chevron -->
      <polyline points="-20,-42 0,-22 20,-42"
                stroke="#FC4C02" stroke-width="7" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Bottom chevron -->
      <polyline points="-20,-14 0,6 20,-14"
                stroke="#FC4C02" stroke-width="7" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Strava label -->
  <text x="192" y="315" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700"
        fill="#FC4C02" opacity="0.9">Strava</text>
  <text x="192" y="333" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Running &amp; activities</text>

  <!-- ═══════════════════════════════════════
       GEMINI NODE  (center x=400, y=225)
  ═══════════════════════════════════════ -->
  <g transform="translate(400,225)">
    <!-- Outer ambient glow -->
    <circle r="85" fill="#4285f4" opacity="0.06"/>
    <!-- Ring -->
    <circle r="76" fill="#0b1626" stroke="#4285f4" stroke-width="1.8" stroke-opacity="0.5"/>

    <!-- Gemini 4-pointed star -->
    <g filter="url(#glowG)">
      <path d="M0,-48 C5.3,-5.3 5.3,-5.3 48,0 C5.3,5.3 5.3,5.3 0,48 C-5.3,5.3 -5.3,5.3 -48,0 C-5.3,-5.3 -5.3,-5.3 0,-48 Z"
            fill="url(#geminiGrad)"/>
    </g>
  </g>

  <!-- Gemini label -->
  <text x="400" y="328" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700"
        fill="#4285f4" opacity="0.95">Gemini 2.5 Flash</text>
  <text x="400" y="346" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Coordinator + sub-agents</text>

  <!-- ═══════════════════════════════════════
       HEVY NODE  (center x=608, y=225)
  ═══════════════════════════════════════ -->
  <g transform="translate(608,225)">
    <!-- Outer ambient glow -->
    <circle r="72" fill="#3b82f6" opacity="0.07"/>
    <!-- Ring -->
    <circle r="64" fill="#0c1a2e" stroke="url(#hevyRingGrad)" stroke-width="1.8"/>

    <!-- Dumbbell icon -->
    <g filter="url(#glowS)" fill="#3b82f6">
      <!-- Left weight plate -->
      <rect x="-44" y="-20" width="14" height="40" rx="4"/>
      <!-- Bar -->
      <rect x="-30" y="-7" width="60" height="14" rx="7"/>
      <!-- Right weight plate -->
      <rect x="30" y="-20" width="14" height="40" rx="4"/>
    </g>
  </g>

  <!-- Hevy label -->
  <text x="608" y="315" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700"
        fill="#60a5fa" opacity="0.9">Hevy</text>
  <text x="608" y="333" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Gym workouts &amp; routines</text>

  <!-- Footer tagline -->
  <text x="400" y="418" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">
    Deployed on Cloud Run · Vertex AI Agent Runtime
  </text>
</svg>
